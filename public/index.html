<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Lookup | Ramzan Ahsan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="text-center my-8">
        <h1 class="text-3xl font-bold text-blue-400">Advanced Lookup Tool</h1>
        <p class="text-slate-400 mt-2">Developed by Ramzan Ahsan</p>
    </header>

    <main class="w-full max-w-2xl glass-card rounded-xl p-6 shadow-2xl">
        <div class="flex flex-col gap-4">
            <input type="text" id="phoneInput" placeholder="Enter number (e.g. 03001234567)" 
                   class="bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="performLookup()" id="searchBtn"
                    class="bg-blue-600 hover:bg-blue-700 transition-colors font-bold py-3 rounded-lg">
                Search Identity
            </button>
        </div>

        <div id="results" class="mt-8 space-y-6 hidden">
            <div>
                <h3 class="text-blue-400 font-semibold mb-2 flex items-center">
                    <span class="mr-2">🔍</span> Truecaller Results
                </h3>
                <div id="truecallerResult" class="bg-black/40 p-4 rounded-lg border border-slate-800 text-sm font-mono text-green-400 overflow-auto"></div>
            </div>

            <div>
                <h3 class="text-purple-400 font-semibold mb-2 flex items-center">
                    <span class="mr-2">📊</span> Multi Data Results
                </h3>
                <div id="multiResult" class="bg-black/40 p-4 rounded-lg border border-slate-800 text-sm font-mono text-cyan-400 overflow-auto"></div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-8 text-center">
        <p class="text-slate-500 mb-4">&copy; 2026 Ramzan Ahsan Cloud Chains</p>
        <a href="https://chat.whatsapp.com/LoafyPWMGOv88oElxdwOB8" target="_blank" 
           class="inline-flex items-center bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-full text-sm font-medium transition-transform hover:scale-105">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            Join WhatsApp Group
        </a>
    </footer>

    <script>
        async function performLookup() {
            const num = document.getElementById('phoneInput').value;
            const btn = document.getElementById('searchBtn');
            const resDiv = document.getElementById('results');
            
            if (!num) return alert("Please enter a number");

            btn.disabled = true;
            btn.innerText = "Searching...";
            resDiv.classList.add('hidden');

            try {
                const response = await fetch(`/api/lookup?number=${encodeURIComponent(num)}`);
                const data = await response.json();

                resDiv.classList.remove('hidden');
                
                // Display Truecaller
                document.getElementById('truecallerResult').innerText = 
                    typeof data.truecaller === 'string' ? data.truecaller : JSON.stringify(data.truecaller, null, 2);
                
                // Display Multi
                document.getElementById('multiResult').innerText = JSON.stringify(data.multi, null, 2);

            } catch (err) {
                alert("An error occurred during lookup.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Search Identity";
            }
        }
    </script>
</body>
</html>
